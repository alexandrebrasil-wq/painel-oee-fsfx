<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>i-OMT — Painel de Ações</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--s1:#161b22;--s2:#1c2128;--s3:#21262d;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);--b3:rgba(255,255,255,.22);
  --tx:#e6edf3;--tx2:#8b949e;--tx3:#484f58;
  --green:#1D9E75;--gt:#3dd68c;--gd:rgba(29,158,117,.15);
  --amber:#d29922;--at:#e3b341;--ad:rgba(210,153,34,.15);
  --red:#da3633;--rt:#f85149;--rd:rgba(218,54,51,.15);
  --blue:#388bfd;--bt:#79c0ff;--bd:rgba(56,139,253,.12);
  --rad:rgba(255,107,53,.15);--rat:#ff9a6c;
  --ff:'Syne',sans-serif;--fm:'DM Mono',monospace;
}
html,body{min-height:100vh;background:var(--bg);color:var(--tx);font-family:var(--ff);font-size:14px}
.hdr{background:var(--s1);border-bottom:1px solid var(--b1);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.hdr-left{display:flex;align-items:center;gap:12px}
.logo{height:28px}
.hdr-title{font-size:15px;font-weight:600}
.hdr-sub{font-size:11px;color:var(--tx2);margin-top:2px;font-family:var(--fm)}
.toolbar{background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.filter-label{font-size:11px;color:var(--tx2)}
.btn-filter{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--tx2);cursor:pointer;font-family:var(--ff);transition:all .15s}
.btn-filter:hover{border-color:var(--b3);color:var(--tx)}
.btn-filter.active{background:var(--bd);border-color:var(--blue);color:var(--bt)}
.btn-filter.area-qt.active{background:var(--gd);border-color:var(--green);color:var(--gt)}
.btn-filter.area-farm.active{background:var(--ad);border-color:var(--amber);color:var(--at)}
.btn-filter.area-radio.active{background:var(--rad);border-color:#ff6b35;color:var(--rat)}
.sep{width:1px;height:20px;background:var(--b2);margin:0 4px}
.btn-new{background:var(--green);border:none;border-radius:6px;padding:5px 16px;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s;margin-left:auto}
.btn-new:hover{opacity:.85}
.status-pill{display:flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b2);border-radius:20px;padding:4px 12px;font-size:11px;font-family:var(--fm);color:var(--tx2)}
.sdot{width:7px;height:7px;border-radius:50%;background:var(--tx3)}
.sdot.ok{background:var(--gt);animation:pdot 2s ease-in-out infinite}
.sdot.err{background:var(--rt)}
.sdot.saving{background:var(--at);animation:pdot .5s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1}50%{opacity:.4}}
/* KPI */
.kpi-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--b1);border-bottom:1px solid var(--b1)}
.kpi{background:var(--s1);padding:12px 18px}
.kpi-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);margin-bottom:4px}
.kpi-val{font-size:22px;font-weight:700;line-height:1;font-family:var(--fm)}
.kpi-val.green{color:var(--gt)}.kpi-val.amber{color:var(--at)}.kpi-val.red{color:var(--rt)}.kpi-val.blue{color:var(--bt)}
.kpi-sub{font-size:10px;color:var(--tx2);margin-top:3px}
/* KANBAN */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;padding:16px 20px;align-items:start}
.col{background:var(--s1);border:1px solid var(--b1);border-radius:10px;overflow:hidden}
.col-hdr{padding:10px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.col-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:8px}
.col-dot{width:8px;height:8px;border-radius:50%}
.dot-aberta{background:var(--rt)}.dot-andamento{background:var(--at)}.dot-concluida{background:var(--gt)}
.col-count{font-size:11px;font-family:var(--fm);color:var(--tx3)}
.col-body{padding:10px;display:flex;flex-direction:column;gap:8px;min-height:80px}
/* CARD */
.card{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:11px 12px;cursor:pointer;transition:border-color .15s,transform .1s}
.card:hover{border-color:var(--b3);transform:translateY(-1px)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:7px}
.card-area{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;padding:2px 7px;border-radius:20px}
.area-qt{background:var(--gd);color:var(--gt)}.area-farm{background:var(--ad);color:var(--at)}.area-radio{background:var(--rad);color:var(--rat)}
.card-prio{font-size:10px;font-family:var(--fm);padding:2px 6px;border-radius:4px}
.prio-alta{background:var(--rd);color:var(--rt)}.prio-media{background:var(--ad);color:var(--at)}.prio-baixa{background:var(--bd);color:var(--bt)}
.card-desc{font-size:12px;color:var(--tx);line-height:1.4;margin-bottom:8px}
.card-meta{display:flex;align-items:center;justify-content:space-between;gap:6px;flex-wrap:wrap}
.card-resp{font-size:11px;color:var(--tx2);font-family:var(--fm)}
.card-prazo{font-size:10px;font-family:var(--fm);padding:2px 7px;border-radius:4px}
.prazo-ok{background:var(--gd);color:var(--gt)}.prazo-hoje{background:var(--ad);color:var(--at)}.prazo-venc{background:var(--rd);color:var(--rt)}.prazo-sem{color:var(--tx3)}
.card-origem{font-size:10px;color:var(--tx3);font-family:var(--fm)}
.card-comentario{margin-top:7px;padding-top:7px;border-top:1px solid var(--b1);font-size:11px;color:var(--tx2);line-height:1.4;font-style:italic}
.card-date{font-size:10px;color:var(--tx3);font-family:var(--fm);margin-top:6px;text-align:right}
.col-empty{text-align:center;padding:20px;font-size:11px;color:var(--tx3);font-family:var(--fm)}
/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.overlay.hidden{display:none}
.modal{background:var(--s1);border:1px solid var(--b2);border-radius:12px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.modal-hdr{padding:14px 18px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:600}
.btn-close{background:none;border:none;color:var(--tx2);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px}
.btn-close:hover{background:var(--b1);color:var(--tx)}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.field{display:flex;flex-direction:column;gap:5px}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3)}
input,select,textarea{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:8px 10px;font-size:13px;color:var(--tx);font-family:var(--ff);width:100%;transition:border-color .15s}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
textarea{resize:vertical;min-height:72px;line-height:1.5}
select option{background:var(--s2)}
.modal-footer{padding:14px 18px;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end;align-items:center}
.btn-save{background:var(--green);border:none;border-radius:6px;padding:7px 20px;font-size:13px;font-weight:600;color:#fff;cursor:pointer;transition:opacity .15s}
.btn-save:hover{opacity:.85}.btn-save:disabled{opacity:.5;cursor:not-allowed}
.btn-cancel{background:var(--s2);border:1px solid var(--b2);border-radius:6px;padding:7px 16px;font-size:13px;color:var(--tx2);cursor:pointer}
.btn-cancel:hover{border-color:var(--b3);color:var(--tx)}
.btn-delete{background:var(--rd);border:1px solid var(--rt);border-radius:6px;padding:7px 14px;font-size:13px;color:var(--rt);cursor:pointer;margin-right:auto}
.btn-delete:hover{background:var(--rt);color:#fff}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:820px){.kanban{grid-template-columns:1fr}.kpi-bar{grid-template-columns:1fr 1fr}.field-row{grid-template-columns:1fr}}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-left">
    <img src="https://painel.i-omt.com/logo_iomt_branco.png" class="logo" alt="i-OMT">
    <div>
      <div class="hdr-title">Painel de Ações — Reunião Diária</div>
      <div class="hdr-sub">QT · Farmácia · Radioterapia</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
    <button class="btn-filter" onclick="carregar()" style="font-size:11px;padding:4px 10px">↻ Atualizar</button>
    <div class="status-pill">
      <div class="sdot" id="sdot"></div>
      <span id="status-txt">carregando</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <span class="filter-label">Área:</span>
  <button class="btn-filter active" data-area="todas" onclick="filtrar(this)">Todas</button>
  <button class="btn-filter area-qt" data-area="QT" onclick="filtrar(this)">QT</button>
  <button class="btn-filter area-farm" data-area="Farmácia" onclick="filtrar(this)">Farmácia</button>
  <button class="btn-filter area-radio" data-area="Radioterapia" onclick="filtrar(this)">Radioterapia</button>
  <div class="sep"></div>
  <span class="filter-label">Prioridade:</span>
  <button class="btn-filter active" data-prio="todas" onclick="filtrarPrio(this)">Todas</button>
  <button class="btn-filter" data-prio="Alta" onclick="filtrarPrio(this)" style="color:var(--rt)">Alta</button>
  <button class="btn-filter" data-prio="Média" onclick="filtrarPrio(this)" style="color:var(--at)">Média</button>
  <button class="btn-filter" data-prio="Baixa" onclick="filtrarPrio(this)" style="color:var(--bt)">Baixa</button>
  <button class="btn-new" onclick="abrirModal()">+ Nova Ação</button>
</div>

<div class="kpi-bar">
  <div class="kpi"><div class="kpi-label">Total ações</div><div class="kpi-val blue" id="k-total">—</div><div class="kpi-sub">registradas</div></div>
  <div class="kpi"><div class="kpi-label">Em aberto</div><div class="kpi-val red" id="k-abertas">—</div><div class="kpi-sub">aguardando início</div></div>
  <div class="kpi"><div class="kpi-label">Em andamento</div><div class="kpi-val amber" id="k-andamento">—</div><div class="kpi-sub">em execução</div></div>
  <div class="kpi"><div class="kpi-label">Concluídas</div><div class="kpi-val green" id="k-concluidas">—</div><div class="kpi-sub">finalizadas</div></div>
  <div class="kpi"><div class="kpi-label">Vencidas</div><div class="kpi-val red" id="k-vencidas">—</div><div class="kpi-sub">prazo expirado</div></div>
</div>

<div class="kanban">
  <div class="col">
    <div class="col-hdr"><span class="col-title"><span class="col-dot dot-aberta"></span>Aberta</span><span class="col-count" id="cnt-aberta">0</span></div>
    <div class="col-body" id="col-aberta"></div>
  </div>
  <div class="col">
    <div class="col-hdr"><span class="col-title"><span class="col-dot dot-andamento"></span>Em andamento</span><span class="col-count" id="cnt-andamento">0</span></div>
    <div class="col-body" id="col-andamento"></div>
  </div>
  <div class="col">
    <div class="col-hdr"><span class="col-title"><span class="col-dot dot-concluida"></span>Concluída</span><span class="col-count" id="cnt-concluida">0</span></div>
    <div class="col-body" id="col-concluida"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="overlay">
  <div class="modal">
    <div class="modal-hdr">
      <span class="modal-title" id="modal-title">Nova Ação</span>
      <button class="btn-close" onclick="fecharModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="field-row">
        <div class="field"><label>Área</label>
          <select id="f-area">
            <option value="QT">QT (Ocupação)</option>
            <option value="Farmácia">Farmácia</option>
            <option value="Radioterapia">Radioterapia</option>
          </select>
        </div>
        <div class="field"><label>Prioridade</label>
          <select id="f-prio">
            <option value="Alta">Alta</option>
            <option value="Média" selected>Média</option>
            <option value="Baixa">Baixa</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Desvio identificado</label>
        <textarea id="f-desc" placeholder="Descreva o desvio ou problema observado..."></textarea>
      </div>
      <div class="field"><label>Ação a ser tomada</label>
        <textarea id="f-acao" placeholder="Descreva a ação corretiva ou plano de resposta..."></textarea>
      </div>
      <div class="field-row">
        <div class="field"><label>Responsável</label><input type="text" id="f-resp" placeholder="Nome ou cargo"></div>
        <div class="field"><label>Prazo</label><input type="date" id="f-prazo"></div>
      </div>
      <div class="field-row">
        <div class="field"><label>Status</label>
          <select id="f-status">
            <option value="Aberta">Aberta</option>
            <option value="Em andamento">Em andamento</option>
            <option value="Concluída">Concluída</option>
          </select>
        </div>
        <div class="field"><label>Origem</label>
          <select id="f-origem">
            <option value="Dado do painel">Dado do painel</option>
            <option value="Observação manual">Observação manual</option>
          </select>
        </div>
      </div>
      <div class="field"><label>Comentário / Atualização</label>
        <textarea id="f-comentario" placeholder="Andamento, bloqueios, observações..." style="min-height:56px"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-delete hidden" id="btn-delete" onclick="excluirAcao()">Excluir</button>
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" id="btn-save" onclick="salvarAcao()">Salvar ação</button>
    </div>
  </div>
</div>

<script>
// ── CONFIG ─────────────────────────────────────────────────────
var APPS_URL = 'https://script.google.com/macros/s/AKfycbzWaIPi8VZdwPYHN-cbTzpIm-RbwjFcTRAFtk3NKEjlPLVFiRrnzqqBbr04KtTMNElRwg/exec';

// ── STATE ───────────────────────────────────────────────────────
var acoes     = [];
var filtrArea = 'todas';
var filtrPrio = 'todas';
var editId    = null;

// ── API ──────────────────────────────────────────────────────────
async function api(params){
  var qs=Object.entries(params).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v||'')).join('&');
  var r=await fetch(APPS_URL+'?'+qs+'&t='+Date.now());
  var d=await r.json();
  if(d.status==='erro') throw new Error(d.message||'Erro Apps Script');
  return d;
}

// ── STATUS ──────────────────────────────────────────────────────
function setStatus(t,txt){
  var dot=document.getElementById('sdot'), s=document.getElementById('status-txt');
  dot.className='sdot'+(t==='ok'?' ok':t==='err'?' err':t==='saving'?' saving':'');
  s.textContent=txt;
}

// ── CARREGAR ────────────────────────────────────────────────────
async function carregar(){
  setStatus('','carregando');
  try{
    var r = await api({acao:'listar'});
    acoes = r.rows||[];
    setStatus('ok', acoes.length+' ações');
  } catch(e){
    setStatus('err','erro ao carregar');
    console.error(e);
  }
  renderTudo();
}

// ── FILTROS ─────────────────────────────────────────────────────
function filtrar(btn){
  document.querySelectorAll('[data-area]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filtrArea=btn.dataset.area; renderTudo();
}
function filtrarPrio(btn){
  document.querySelectorAll('[data-prio]').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active'); filtrPrio=btn.dataset.prio; renderTudo();
}
function aplicarFiltros(lista){
  return lista.filter(a=>(filtrArea==='todas'||a.area===filtrArea)&&(filtrPrio==='todas'||a.prioridade===filtrPrio));
}

// ── RENDER ──────────────────────────────────────────────────────
function renderTudo(){
  var lista=aplicarFiltros(acoes);
  var hoje=new Date(); hoje.setHours(0,0,0,0);
  var vencidas=acoes.filter(a=>a.status!=='Concluída'&&a.prazo&&new Date(a.prazo)<hoje).length;
  document.getElementById('k-total').textContent      = acoes.length;
  document.getElementById('k-abertas').textContent    = acoes.filter(a=>a.status==='Aberta').length;
  document.getElementById('k-andamento').textContent  = acoes.filter(a=>a.status==='Em andamento').length;
  document.getElementById('k-concluidas').textContent = acoes.filter(a=>a.status==='Concluída').length;
  document.getElementById('k-vencidas').textContent   = vencidas;
  renderCol('aberta',   lista.filter(a=>a.status==='Aberta'),       hoje);
  renderCol('andamento',lista.filter(a=>a.status==='Em andamento'), hoje);
  renderCol('concluida',lista.filter(a=>a.status==='Concluída'),    hoje);
}

function renderCol(id,lista,hoje){
  var col=document.getElementById('col-'+id), cnt=document.getElementById('cnt-'+id);
  col.innerHTML=''; cnt.textContent=lista.length;
  if(!lista.length){col.innerHTML='<div class="col-empty">sem ações</div>';return;}
  var ord={Alta:0,Média:1,Baixa:2};
  lista.slice().sort((a,b)=>{
    var p=(ord[a.prioridade]||1)-(ord[b.prioridade]||1); if(p) return p;
    if(!a.prazo&&!b.prazo) return 0; if(!a.prazo) return 1; if(!b.prazo) return -1;
    return new Date(a.prazo)-new Date(b.prazo);
  }).forEach(a=>col.appendChild(buildCard(a,hoje)));
}

function buildCard(a,hoje){
  var div=document.createElement('div'); div.className='card'; div.onclick=()=>abrirModal(a.id);
  var prazoHtml='<span class="card-prazo prazo-sem">sem prazo</span>';
  if(a.prazo){
    var dp=new Date(a.prazo); dp.setHours(0,0,0,0);
    var diff=Math.round((dp-hoje)/864e5);
    var cls=diff<0?'prazo-venc':diff===0?'prazo-hoje':'prazo-ok';
    var lbl=diff<0?'Venceu '+fmtData(a.prazo):diff===0?'Vence hoje':fmtData(a.prazo);
    prazoHtml='<span class="card-prazo '+cls+'">📅 '+lbl+'</span>';
  }
  var areaCls=a.area==='QT'?'area-qt':a.area==='Farmácia'?'area-farm':'area-radio';
  var prioCls=a.prioridade==='Alta'?'prio-alta':a.prioridade==='Média'?'prio-media':'prio-baixa';
  div.innerHTML=`
    <div class="card-top">
      <span class="card-area ${areaCls}">${esc(a.area)}</span>
      <span class="card-prio ${prioCls}">${esc(a.prioridade)}</span>
    </div>
    <div class="card-desc"><strong style="color:var(--tx3);font-size:9px;text-transform:uppercase;letter-spacing:.06em">Desvio</strong><br>${esc(a.descricao)}</div>
    ${a.acao?'<div class="card-desc" style="margin-top:-2px"><strong style="color:var(--gt);font-size:9px;text-transform:uppercase;letter-spacing:.06em">Ação</strong><br>'+esc(a.acao)+'</div>':''}
    <div class="card-meta">
      <span class="card-resp">👤 ${esc(a.responsavel||'—')}</span>
      ${prazoHtml}
    </div>
    <div class="card-meta" style="margin-top:4px">
      <span class="card-origem">${esc(a.origem||'')}</span>
    </div>
    ${a.comentario?'<div class="card-comentario">💬 '+esc(a.comentario)+'</div>':''}
    ${a.criadoEm?'<div class="card-date">'+fmtDH(a.criadoEm)+'</div>':''}`;
  return div;
}

// ── MODAL ───────────────────────────────────────────────────────
function abrirModal(id){
  editId=id||null;
  var a=id?acoes.find(x=>x.id===id):null;
  document.getElementById('modal-title').textContent=a?'Editar Ação':'Nova Ação';
  document.getElementById('btn-delete').classList.toggle('hidden',!a);
  document.getElementById('f-area').value      =a?a.area:'QT';
  document.getElementById('f-prio').value      =a?a.prioridade:'Média';
  document.getElementById('f-desc').value      =a?a.descricao:'';
  document.getElementById('f-acao').value      =a?(a.acao||''):'';
  document.getElementById('f-resp').value      =a?(a.responsavel||''):'';
  document.getElementById('f-prazo').value     =a?(a.prazo||''):'';
  document.getElementById('f-status').value    =a?a.status:'Aberta';
  document.getElementById('f-origem').value    =a?a.origem:'Observação manual';
  document.getElementById('f-comentario').value=a?(a.comentario||''):'';
  document.getElementById('overlay').classList.remove('hidden');
  setTimeout(()=>document.getElementById('f-desc').focus(),50);
}
function fecharModal(){ document.getElementById('overlay').classList.add('hidden'); editId=null; }
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)fecharModal();});

async function salvarAcao(){
  var desc=document.getElementById('f-desc').value.trim();
  if(!desc){alert('Informe o desvio identificado.');return;}
  var btn=document.getElementById('btn-save');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Salvando...';
  setStatus('saving','salvando');

  var params={
    area:        document.getElementById('f-area').value,
    prioridade:  document.getElementById('f-prio').value,
    descricao:   desc,
    acaoTxt:     document.getElementById('f-acao').value.trim(),
    responsavel: document.getElementById('f-resp').value.trim(),
    prazo:       document.getElementById('f-prazo').value||'',
    status:      document.getElementById('f-status').value,
    origem:      document.getElementById('f-origem').value,
    comentario:  document.getElementById('f-comentario').value.trim()
  };
  if(editId) params.id=editId;

  try{
    var r=await api(Object.assign({acao:'gravar'},params));
    if(editId){
      var idx=acoes.findIndex(a=>a.id===editId);
      if(idx>=0) acoes[idx]={...acoes[idx],
        area:params.area, prioridade:params.prioridade, descricao:params.descricao,
        acao:params.acaoTxt, responsavel:params.responsavel, prazo:params.prazo,
        status:params.status, origem:params.origem, comentario:params.comentario,
        atualizadoEm:new Date().toISOString()};
    } else {
      acoes.push({
        id:r.id, area:params.area, prioridade:params.prioridade, descricao:params.descricao,
        acao:params.acaoTxt, responsavel:params.responsavel, prazo:params.prazo,
        status:params.status, origem:params.origem, comentario:params.comentario,
        criadoEm:new Date().toISOString(), atualizadoEm:new Date().toISOString()
      });
    }
    setStatus('ok','salvo');
    fecharModal(); renderTudo();
  } catch(e){
    setStatus('err','erro ao salvar');
    alert('Erro ao salvar:\n'+e.message);
  }
  btn.disabled=false; btn.textContent='Salvar ação';
}

async function excluirAcao(){
  if(!editId||!confirm('Excluir esta ação?')) return;
  setStatus('saving','removendo');
  try{
    await api({acao:'excluir',id:editId});
    acoes=acoes.filter(a=>a.id!==editId);
    setStatus('ok','removido');
    fecharModal(); renderTudo();
  } catch(e){ setStatus('err','erro'); alert('Erro: '+e.message); }
}

// ── UTILS ───────────────────────────────────────────────────────
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function fmtData(iso){if(!iso)return'';var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function fmtDH(iso){if(!iso)return'';var d=new Date(iso);return d.toLocaleDateString('pt-BR')+' '+d.toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});}

carregar();
</script>
