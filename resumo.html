<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=1920">
<title>Painel Gerencial - Centro de Infusao QT</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#0d1117;color:#fff;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;}
body{display:flex;flex-direction:column;}
header{background:#0d1419;border-bottom:2px solid #1b2e6b;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hl{display:flex;align-items:center;gap:14px;}.htitle{font-size:16px;font-weight:600;}
.hsub{font-size:10px;color:#8b949e;margin-top:2px;}
.clock{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;}
.date-str{font-size:10px;color:#8b949e;text-align:right;}
.nav{background:#111820;border-bottom:1px solid #21262d;padding:0 24px;height:36px;display:flex;align-items:center;gap:4px;flex-shrink:0;}
.nav a{display:flex;align-items:center;height:36px;padding:0 14px;font-size:12px;color:#8b949e;text-decoration:none;border-bottom:2px solid transparent;}
.nav a:hover{color:#fff;}.nav a.active{color:#fff;border-bottom-color:#1b2e6b;font-weight:500;}
.ctrl{background:#111820;border-bottom:1px solid #21262d;padding:6px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap;}
.ctrl label{font-size:10px;color:#8b949e;text-transform:uppercase;letter-spacing:.04em;}
.ctrl input[type=date]{background:#0d1117;border:1px solid #30363d;color:#fff;padding:5px 10px;border-radius:6px;font-size:12px;}
.ctrl button{background:#1b2e6b;border:none;color:#fff;padding:5px 14px;border-radius:6px;font-size:12px;cursor:pointer;font-weight:500;}
.ctrl button:hover{background:#2a3f8f;}
.ctrl button.sec{background:#21262d;font-weight:400;}
.ctrl button.sec:hover{background:#30363d;}
.vsep{width:1px;height:22px;background:#21262d;}
.fonte{font-size:10px;margin-left:auto;}
.flive{color:#3fb950;font-weight:600;}.flocal{color:#f59e0b;font-weight:600;}

/* FILTRO FLUXO */
.fluxo-tabs{display:flex;gap:4px;margin-left:8px;}
.ftab{padding:4px 12px;border-radius:5px;font-size:11px;font-weight:500;cursor:pointer;border:1px solid #30363d;color:#8b949e;background:transparent;transition:.15s;}
.ftab:hover{color:#fff;border-color:#555;}
.ftab.active{color:#fff;border-color:transparent;}
.ftab.fa{background:#1b2e6b;color:#7ca9f0;border-color:#1b2e6b;}
.ftab.f0{background:#2a1a50;color:#a78bfa;border-color:#7c3aed;}
.ftab.f1{background:#3d2000;color:#fb923c;border-color:#f97316;}
.ftab.f2{background:#0f2540;color:#60a5fa;border-color:#3b82f6;}
.ftab.f3{background:#181818;color:#888;border-color:#444;}
.ftab.f4{background:#181818;color:#888;border-color:#444;}

/* CONTENT */
.content{flex:1;padding:12px 20px;display:flex;flex-direction:column;gap:12px;overflow-y:auto;}

/* VELOCIMETROS */
.gauges-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.gauge-card{background:#111820;border:1px solid #21262d;border-radius:12px;padding:16px;display:flex;flex-direction:column;align-items:center;gap:6px;}
.gauge-title{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:#8b949e;text-align:center;}
.gauge-svg{width:160px;height:90px;}
.gauge-val{font-size:28px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
.gauge-meta{font-size:10px;color:#8b949e;}
.gauge-delta{font-size:11px;font-weight:600;}
.dup{color:#3fb950;}.ddn{color:#f85149;}.deq{color:#8b949e;}

/* SECAO TITULO */
.sec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.sec-hdr span{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;}
.sec-hdr hr{flex:1;border:none;border-top:0.5px solid #21262d;}

/* GRAFICOS */
.charts-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.charts-row3{display:grid;grid-template-columns:2fr 1fr 1fr;gap:12px;}
.panel{background:#111820;border:1px solid #21262d;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;}
.phdr{padding:8px 14px;border-bottom:1px solid #21262d;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.pbody{padding:10px 14px;flex:1;}

/* CHART BARRAS */
.chart-area{display:flex;align-items:flex-end;gap:3px;height:110px;padding-top:4px;position:relative;}
.bar-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;min-width:0;}
.bar-bg{width:100%;border-radius:3px 3px 0 0;transition:height .4s;min-height:2px;position:relative;}
.bar-bg:hover::after{content:attr(data-tip);position:absolute;bottom:105%;left:50%;transform:translateX(-50%);background:#1f2937;color:#fff;padding:3px 8px;border-radius:4px;font-size:10px;white-space:nowrap;pointer-events:none;z-index:10;}
.bar-lbl{font-size:8px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center;}
.bar-val{font-size:9px;font-weight:600;font-variant-numeric:tabular-nums;}
.meta-line{position:absolute;left:0;right:0;border-top:1.5px dashed rgba(255,255,255,.25);pointer-events:none;}

/* LINHA */
.line-chart{position:relative;height:110px;padding-top:4px;}
.line-chart svg{width:100%;height:100%;}

/* PARETO */
.pareto-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:.5px solid #21262d;}
.pareto-row:last-child{border-bottom:none;}
.pareto-nm{font-size:11px;color:#ccc;min-width:90px;}
.pareto-bw{flex:1;height:14px;background:#21262d;border-radius:3px;overflow:hidden;position:relative;}
.pareto-bf{height:14px;border-radius:3px;}
.pareto-bf2{height:14px;background:rgba(255,255,255,.15);border-radius:3px;position:absolute;top:0;left:0;}
.pareto-v{font-size:11px;font-weight:600;min-width:44px;text-align:right;font-variant-numeric:tabular-nums;}
.pareto-c{font-size:10px;color:#8b949e;min-width:26px;text-align:right;}
.pareto-pct{font-size:10px;color:#8b949e;min-width:36px;text-align:right;}

/* TABELA */
table.t{width:100%;border-collapse:collapse;font-size:11px;}
table.t th{padding:5px 8px;text-align:left;font-size:9px;text-transform:uppercase;color:#8b949e;border-bottom:1px solid #21262d;font-weight:500;}
table.t td{padding:5px 8px;border-bottom:.5px solid #21262d;}
table.t tr:last-child td{border-bottom:none;}
.bf{display:inline-block;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;}
.f0{background:#2a1a50;color:#a78bfa;}.f1{background:#3d2000;color:#fb923c;}
.f2{background:#0f2540;color:#60a5fa;}.f3,.f4{background:#181818;color:#888;}
.ok{color:#3fb950;}.warn{color:#f59e0b;}.crit{color:#f85149;}

/* DIA CARDS */
.dias-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:6px;}
.dia-card{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:8px;text-align:center;}
.dia-card-dt{font-size:9px;color:#8b949e;margin-bottom:4px;}
.dia-card-oee{font-size:18px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1;}
.dia-card-sub{font-size:9px;color:#8b949e;margin-top:2px;}
.dia-card-bar{height:3px;border-radius:2px;margin-top:5px;}

footer{background:#111820;border-top:1px solid #21262d;padding:0 20px;height:20px;display:flex;align-items:center;justify-content:space-between;font-size:9px;color:#8b949e;flex-shrink:0;}
</style>
</head>

function tick(){

  document.getElementById('clock').textContent=n.toLocaleTimeString('pt-BR');

}

function getFluxo(n){return FLUXOS.find(function(f){return f.poltronas.includes(n);})||FLUXOS[0];}

function parseDt(ts){
  try{
    var p=ts.split(' '),dp=p[0].split('/'),hp=(p[1]||'00:00:00').split(':');
    return new Date(+dp[2],+dp[1]-1,+dp[0],+hp[0],+hp[1],+(hp[2]||0));
  }catch(e){return null;}
}
function fmtMin(m){
  if(!m||m<1)return'<1min';
  if(m<60)return Math.round(m)+'min';
  return Math.floor(m/60)+'h'+String(Math.round(m%60)).padStart(2,'0')+'min';
}
function toDatePT(str){var p=str.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function diasEntre(d1,d2){
  var ini=new Date(d1),fim=new Date(d2),dias=[];
  for(var d=new Date(ini);d<=fim;d.setDate(d.getDate()+1)){
    var dd=String(d.getDate()).padStart(2,'0'),mm=String(d.getMonth()+1).padStart(2,'0'),aa=d.getFullYear();
    dias.push(dd+'/'+mm+'/'+aa);
  }
  return dias;
}
function oeeColor(v,meta){return v>=meta?'#3fb950':v>=meta*0.85?'#f59e0b':'#f85149';}
function pct(v){return Math.round((v||0)*100)+'%';}

// Filtrar poltronas pelo fluxo ativo
function polFiltradas(){
  if(fluxoAtivo===-1)return null; // todas
  return FLUXOS[fluxoAtivo].poltronas;
}
function nPolFiltradas(){
  if(fluxoAtivo===-1)return 47;
  return FLUXOS[fluxoAtivo].poltronas.length;
}

function analisarDia(rows,diaStr){
  var pols=polFiltradas();
  var st={};
  for(var n=1;n<=47;n++){
    if(pols&&!pols.includes(n))continue;
    var num=String(n).padStart(2,'0');
    st[num]={fi:getFluxo(n).idx,paciente:false,ciTs:null,tipo:'',paradas:[],sessoes:[]};
  }
  rows.forEach(function(r){
    var ts=r[0],pol=r[1],ev=r[2],mot=r[3],tipo=r[4];
    if(!pol||ts.split(' ')[0]!==diaStr)return;
    var num=pol.replace('Poltrona ','').trim().padStart(2,'0');
    if(!st[num])return;
    var dt=parseDt(ts);if(!dt)return;
    var h=dt.getHours();if(h<TURNO_INI||h>=TURNO_FIM)return;
    if(ev==='Check In Paciente'){st[num].paciente=true;st[num].ciTs=ts;st[num].tipo=tipo||'';}
    else if(ev==='Check Out Paciente'){
      if(st[num].ciTs){var ini=parseDt(st[num].ciTs);if(ini&&dt>ini){var dur=(dt-ini)/60000;if(dur>0&&dur<780)st[num].sessoes.push({dur:dur,tipo:st[num].tipo});}}
      st[num].paciente=false;st[num].ciTs=null;
    }
    else if(ev==='Início da Parada'||ev==='Inicio da Parada'){st[num].paradas.push({ini:ts,fim:null,mot:mot||'',dur:0});}
    else if(ev==='Fim da parada'){
      for(var i=st[num].paradas.length-1;i>=0;i--){
        if(!st[num].paradas[i].fim){var pi=parseDt(st[num].paradas[i].ini);st[num].paradas[i].fim=ts;if(pi&&dt)st[num].paradas[i].dur=(dt-pi)/60000;break;}
      }
    }
  });

  var totPac=0,totParado=0,nPar=0,tempoAtend=0;
  var porTipo={},porMot={};
  var ocupH=Array(TURNO_FIM-TURNO_INI).fill(0);
  var nPol=nPolFiltradas();

  Object.entries(st).forEach(function(e){
    var s=e[1];
    s.sessoes.forEach(function(sess){
      totPac++;tempoAtend+=sess.dur;
      var t=sess.tipo||'N/A';
      if(!porTipo[t])porTipo[t]={n:0,tot:0};
      porTipo[t].n++;porTipo[t].tot+=sess.dur;
    });
    s.paradas.forEach(function(p){
      if(!p.fim||p.dur<=0)return;
      nPar++;totParado+=p.dur;
      var k=p.mot.includes('Manipul')?'Farmacia':
        (p.mot.includes('édica')||p.mot.includes('edica'))?'Lib. Medica':
        (p.mot.includes('Conv')||p.mot.includes('conv'))?'Lib. Convenio':
        (p.mot.includes('intercorr')||p.mot.includes('devolu'))?'Interc./Dev.':'Outros';
      if(!porMot[k])porMot[k]={n:0,tot:0};
      porMot[k].n++;porMot[k].tot+=p.dur;
    });
  });

  // Ocupação hora a hora
  rows.forEach(function(r){
    var ts=r[0],pol=r[1],ev=r[2];
    if(!pol||ts.split(' ')[0]!==diaStr||ev!=='Check In Paciente')return;
    var num=pol.replace('Poltrona ','').trim().padStart(2,'0');
    if(!st[num])return;
    var dt=parseDt(ts);if(!dt)return;
    var h=dt.getHours();if(h>=TURNO_INI&&h<TURNO_FIM)ocupH[h-TURNO_INI]++;
  });

  var tempoTotal=nPol*TURNO_MIN;
  // OEE = Tempo total de atendimento (Check In->Out) / Tempo total disponivel
  var oee=tempoTotal>0?Math.min(1,tempoAtend/tempoTotal):0;
  // Disponibilidade = (Tempo disponivel - Tempo em paradas) / Tempo disponivel
  var disp=Math.max(0,Math.min(1,(tempoTotal-totParado)/tempoTotal));
  // Ocupacao = (Tempo atendimento + Tempo em paradas com paciente) / Tempo disponivel
  // Aproximacao: tempo ocupado = tempo atendimento + tempo parado (parada ocorre com paciente na poltrona)
  var tempoOcupado=tempoAtend+totParado;
  var ocup=tempoTotal>0?Math.min(1,tempoOcupado/tempoTotal):0;
  var perf=oee;
  var efic=oee;
  var picoIdx=ocupH.indexOf(Math.max.apply(null,ocupH));
  var picoVal=Math.max.apply(null,ocupH);

  return{totPac:totPac,totParado:totParado,nPar:nPar,tempoAtend:tempoAtend,
    disp:disp,efic:efic,ocup:ocup,perf:perf,oee:oee,
    porTipo:porTipo,porMot:porMot,ocupH:ocupH,picoIdx:picoIdx,picoVal:picoVal,
    temDados:totPac>0||nPar>0};
}

// VELOCIMETRO SVG
function gauge(val,meta,cor,label){
  var v=Math.min(Math.max(val,0),1);
  var angle=-180+v*180; // -180 a 0
  var rad=(angle)*Math.PI/180;
  var cx=80,cy=80,r=60;
  var x=cx+r*Math.cos(rad),y=cy+r*Math.sin(rad);
  // arco de fundo
  var bg='M '+(cx-r)+' '+cy+' A '+r+' '+r+' 0 0 1 '+(cx+r)+' '+cy;
  // arco colorido
  var startAngle=-Math.PI;
  var endAngle=(angle)*Math.PI/180;
  var x1=cx+r*Math.cos(startAngle),y1=cy+r*Math.sin(startAngle);
  var x2=cx+r*Math.cos(endAngle),y2=cy+r*Math.sin(endAngle);
  var lg=(endAngle-startAngle)>Math.PI?1:0;
  var arc='M '+x1+' '+y1+' A '+r+' '+r+' 0 '+lg+' 1 '+x2+' '+y2;
  // meta
  var metaAngle=(-180+meta*180)*Math.PI/180;
  var mx1=cx+(r-8)*Math.cos(metaAngle),my1=cy+(r-8)*Math.sin(metaAngle);
  var mx2=cx+(r+8)*Math.cos(metaAngle),my2=cy+(r+8)*Math.sin(metaAngle);
  return '<svg viewBox="0 0 160 90" class="gauge-svg">'
    +'<path d="'+bg+'" fill="none" stroke="#21262d" stroke-width="14" stroke-linecap="round"/>'
    +'<path d="'+arc+'" fill="none" stroke="'+cor+'" stroke-width="14" stroke-linecap="round"/>'
    +'<line x1="'+mx1+'" y1="'+my1+'" x2="'+mx2+'" y2="'+my2+'" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>'
    +'<text x="80" y="76" text-anchor="middle" font-size="8" fill="#8b949e">Meta '+Math.round(meta*100)+'%</text>'
    +'</svg>';
}

function setFluxo(fi,btn){
  fluxoAtivo=fi;
  document.querySelectorAll('.ftab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  if(lastDias)renderAll(lastRes,lastDias);
}

function renderAll(resDias,dias){
  lastRes=resDias;lastDias=dias;
  var diasComDados=resDias.filter(function(x){return x.res.temDados;});
  if(!diasComDados.length){
    document.getElementById('content').innerHTML='<div style="text-align:center;padding:60px;color:#8b949e;font-size:14px;">Sem dados para o periodo e fluxo selecionados.</div>';
    return;
  }

  // Consolidado
  var totPac=0,totParado=0,nPar=0,tempoAtend=0,oeeSum=0,dispSum=0,eficSum=0,ocupSum=0,dn=0;
  var porMotTot={},porTipoTot={};
  diasComDados.forEach(function(x){
    var r=x.res;
    totPac+=r.totPac;totParado+=r.totParado;nPar+=r.nPar;tempoAtend+=r.tempoAtend;
    oeeSum+=r.oee;dispSum+=r.disp;eficSum+=r.efic;ocupSum+=r.ocup;dn++;
    Object.entries(r.porMot).forEach(function(e){var k=e[0],v=e[1];if(!porMotTot[k])porMotTot[k]={n:0,tot:0};porMotTot[k].n+=v.n;porMotTot[k].tot+=v.tot;});
    Object.entries(r.porTipo).forEach(function(e){var t=e[0],v=e[1];if(!porTipoTot[t])porTipoTot[t]={n:0,tot:0};porTipoTot[t].n+=v.n;porTipoTot[t].tot+=v.tot;});
  });
  var oeeM=dn?oeeSum/dn:0;
  var dispM=dn?dispSum/dn:0;
  var eficM=dn?eficSum/dn:0;
  var ocupM=dn?ocupSum/dn:0;

  var c=document.getElementById('content');
  var html='';

  // VELOCIMETROS
  html+='<div class="sec-hdr"><span style="color:#8b949e">Consolidado do periodo</span><hr></div>';
  html+='<div class="gauges-row">';
  var gauges=[
    {lbl:'OEE',val:oeeM,meta:META_OEE,desc:'Atendimento / Disponivel'},
    {lbl:'Disponibilidade',val:dispM,meta:META_DISP,desc:'(Disponivel - Paradas) / Disponivel'},
    {lbl:'Ocupacao',val:ocupM,meta:META_OCUP,desc:'(Atendimento + Paradas) / Disponivel'},
    {lbl:'Pacientes atendidos',val:Math.min(1,totPac/(nPolFiltradas()*dn||1)),meta:0.7,desc:'Sessoes / Poltronas x dias'},
  ];
  gauges.forEach(function(g){
    var cor=oeeColor(g.val,g.meta);
    html+='<div class="gauge-card">'
      +'<div class="gauge-title">'+g.lbl+'</div>'
      +gauge(g.val,g.meta,cor,g.lbl)
      +'<div class="gauge-val" style="color:'+cor+'">'+pct(g.val)+'</div>'
      +'<div class="gauge-meta">Meta: '+pct(g.meta)+' · '+g.desc+'</div>'
      +'<div class="gauge-delta '+(g.val>=g.meta?'dup':'ddn')+'">'+(g.val>=g.meta?'▲ Acima':'▼ Abaixo')+' da meta</div>'
      +'</div>';
  });
  html+='</div>';

  // GRAFICOS POR DIA
  html+='<div class="sec-hdr" style="margin-top:4px"><span style="color:#8b949e">Evolucao diaria</span><hr></div>';
  html+='<div class="charts-row">';

  // OEE + Disponibilidade por dia
  html+='<div class="panel"><div class="phdr" style="color:#a78bfa">OEE e Disponibilidade por dia'
    +'<span style="font-weight:400;font-size:10px;text-transform:none;color:#8b949e">barras=OEE · linha=Disponib.</span></div><div class="pbody">';
  var maxOEE=1;
  html+='<div class="chart-area" id="chart-oee">';
  var metaPxOEE=Math.round(META_OEE*100);
  resDias.forEach(function(x){
    var r=x.res,d=x.dia.slice(0,5);
    var hOEE=Math.round(r.oee*100);
    var cor=oeeColor(r.oee,META_OEE);
    html+='<div class="bar-col">'
      +'<div class="bar-val" style="color:'+cor+'">'+hOEE+'%</div>'
      +'<div class="bar-bg" style="height:'+Math.max(hOEE,1)+'%;background:'+cor+'" data-tip="OEE '+hOEE+'% | Disp '+Math.round(r.disp*100)+'%"></div>'
      +'<div class="bar-lbl">'+d+'</div></div>';
  });
  html+='<div class="meta-line" style="bottom:'+metaPxOEE+'%"></div>';
  html+='</div></div></div>';

  // Atendimentos + Ocupação por dia
  html+='<div class="panel"><div class="phdr" style="color:#60a5fa">Atendimentos e Ocupacao por dia'
    +'<span style="font-weight:400;font-size:10px;text-transform:none;color:#8b949e">barras=atend. · cor=ocupacao</span></div><div class="pbody">';
  var maxPac=Math.max.apply(null,resDias.map(function(x){return x.res.totPac;}))||1;
  html+='<div class="chart-area">';
  resDias.forEach(function(x){
    var r=x.res,d=x.dia.slice(0,5);
    var h=Math.round(r.totPac/maxPac*100);
    var cor=oeeColor(r.ocup,META_OCUP);
    html+='<div class="bar-col">'
      +'<div class="bar-val" style="color:'+cor+'">'+r.totPac+'</div>'
      +'<div class="bar-bg" style="height:'+Math.max(h,1)+'%;background:'+cor+'" data-tip="'+r.totPac+' pac. | Ocup. '+Math.round(r.ocup*100)+'%"></div>'
      +'<div class="bar-lbl">'+d+'</div></div>';
  });
  html+='</div></div></div>';
  html+='</div>'; // charts-row

  // PARETO + INFUSAO + TABELA FLUXO
  html+='<div class="charts-row3">';

  // Pareto de paradas
  var totMotTot=Object.values(porMotTot).reduce(function(a,v){return a+v.tot;},0)||1;
  var sortedMot=Object.entries(porMotTot).sort(function(a,b){return b[1].tot-a[1].tot;});
  var acum=0;
  html+='<div class="panel"><div class="phdr" style="color:#f85149">Pareto de Paradas<span style="font-weight:400;font-size:10px;text-transform:none;color:#8b949e">'+nPar+' ocorr. · '+fmtMin(totParado)+' total</span></div><div class="pbody">';
  sortedMot.forEach(function(e,i){
    var k=e[0],v=e[1];
    acum+=v.tot;
    var pctBar=Math.round(v.tot/totMotTot*100);
    var pctAcum=Math.round(acum/totMotTot*100);
    var cor=i===0?'#f85149':i===1?'#f59e0b':'#60a5fa';
    html+='<div class="pareto-row">'
      +'<span class="pareto-nm">'+k+'</span>'
      +'<div class="pareto-bw">'
      +'<div class="pareto-bf" style="width:'+pctBar+'%;background:'+cor+'"></div>'
      +'<div class="pareto-bf2" style="width:'+pctAcum+'%"></div>'
      +'</div>'
      +'<span class="pareto-c">'+v.n+'x</span>'
      +'<span class="pareto-v" style="color:'+cor+'">'+fmtMin(v.tot)+'</span>'
      +'<span class="pareto-pct">'+pctBar+'%</span>'
      +'</div>';
  });
  if(!sortedMot.length)html+='<div style="color:#3fb950;text-align:center;padding:20px;font-size:12px">Sem paradas</div>';
  html+='</div></div>';

  // Tempo medio por infusao
  var CORS={'Rapida':'#60a5fa','Rápida':'#60a5fa','Curta':'#3b82f6','Media':'#f97316','Média':'#f97316','Longa':'#a78bfa','Longuissima':'#7c3aed','Longuísima':'#7c3aed'};
  var sortedTipo=Object.entries(porTipoTot).sort(function(a,b){return(IDEAL[b[0]]||0)-(IDEAL[a[0]]||0);});
  var maxMed=Math.max.apply(null,sortedTipo.map(function(e){return e[1].tot/e[1].n;}))||1;
  html+='<div class="panel"><div class="phdr" style="color:#fb923c">Tempo Medio por Infusao</div><div class="pbody">';
  sortedTipo.forEach(function(e){
    var t=e[0],v=e[1];var med=v.tot/v.n;var cor=CORS[t]||'#60a5fa';var ideal=IDEAL[t]||240;
    var perf2=Math.min(ideal/Math.max(med,1),1);
    html+='<div class="pareto-row">'
      +'<span class="pareto-nm">'+t+'</span>'
      +'<div class="pareto-bw"><div class="pareto-bf" style="width:'+Math.round(med/maxMed*100)+'%;background:'+cor+'"></div></div>'
      +'<span class="pareto-c">'+v.n+'x</span>'
      +'<span class="pareto-v" style="color:'+cor+'">'+fmtMin(med)+'</span>'
      +'</div>';
  });
  if(!sortedTipo.length)html+='<div style="color:#8b949e;text-align:center;padding:20px;font-size:12px">Sem dados</div>';
  html+='</div></div>';

  // Tabela por fluxo
  html+='<div class="panel"><div class="phdr" style="color:#a78bfa">Resultado por Fluxo</div><div class="pbody">';
  html+='<table class="t"><thead><tr><th>Fluxo</th><th>Pac.</th><th>OEE med.</th><th>Disp.</th><th>Paradas</th></tr></thead><tbody>';
  FLUXOS.forEach(function(fl){
    if(fluxoAtivo!==-1&&fluxoAtivo!==fl.idx)return;
    var totP=0,oeeS=0,dispS=0,parS=0,dd=0;
    diasComDados.forEach(function(x){
      var r=x.res;
      if(r.porFluxo&&r.porFluxo[fl.idx]){totP+=r.porFluxo[fl.idx].n||0;}
      // re-calcular por fluxo nao disponivel no agregado — usar aproximacao
    });
    // Usar totais gerais se filtro ativo
    var oeePrint=fluxoAtivo===fl.idx?pct(oeeM):'-';
    var dispPrint=fluxoAtivo===fl.idx?pct(dispM):'-';
    html+='<tr><td><span class="bf f'+fl.idx+'">'+fl.nome+'</span></td>'
      +'<td style="font-weight:600;color:#fff">'+totP+'</td>'
      +'<td class="'+(oeeM>=META_OEE?'ok':oeeM>=META_OEE*0.85?'warn':'crit')+'">'+oeePrint+'</td>'
      +'<td class="'+(dispM>=META_DISP?'ok':dispM>=META_DISP*0.85?'warn':'crit')+'">'+dispPrint+'</td>'
      +'<td style="color:#f85149">'+nPar+'</td></tr>';
  });
  html+='</tbody></table>';
  html+='</div></div>';
  html+='</div>'; // charts-row3

  // CARDS POR DIA
  html+='<div class="sec-hdr" style="margin-top:4px"><span style="color:#8b949e">Detalhe dia a dia</span><hr></div>';
  html+='<div class="dias-grid">';
  resDias.forEach(function(x){
    var r=x.res,d=x.dia;
    var cor=r.temDados?oeeColor(r.oee,META_OEE):'#444';
    var oeeV=r.temDados?Math.round(r.oee*100):'-';
    html+='<div class="dia-card">'
      +'<div class="dia-card-dt">'+d.slice(0,5)+'</div>'
      +'<div class="dia-card-oee" style="color:'+cor+'">'+oeeV+(r.temDados?'%':'')+'</div>'
      +'<div class="dia-card-sub">'+(r.temDados?r.totPac+' pac · '+r.nPar+' par':'Sem dados')+'</div>'
      +'<div class="dia-card-bar" style="background:'+(r.temDados?cor:'#21262d')+';width:'+(r.temDados?Math.round(r.oee*100)+'%':'100%')+'"></div>'
      +'</div>';
  });
  html+='</div>';

  c.innerHTML=html;
  document.getElementById('fmsg').textContent='Periodo: '+dias[0]+' a '+dias[dias.length-1]+' ('+diasComDados.length+' dias com dados) - '+allRows.length+' registros';
}

function analisar(){
  var d1=document.getElementById('dp1').value;
  var d2=document.getElementById('dp2').value;
  if(!d1||!d2){alert('Selecione o periodo.');return;}
  if(d1>d2){alert('Data inicial deve ser anterior.');return;}
  var rows=allRows.length?allRows:DADOS;
  var dias=diasEntre(d1,d2);
  var resDias=dias.map(function(d){return{dia:d,res:analisarDia(rows,d)};});
  lastDias=dias;lastRes=resDias;
  renderAll(resDias,dias);
}

function setOntem(){var d=new Date();d.setDate(d.getDate()-1);var s=d.toISOString().split('T')[0];document.getElementById('dp1').value=s;document.getElementById('dp2').value=s;}
function setUlt7(){var d2=new Date();d2.setDate(d2.getDate()-1);var d1=new Date();d1.setDate(d1.getDate()-7);document.getElementById('dp1').value=d1.toISOString().split('T')[0];document.getElementById('dp2').value=d2.toISOString().split('T')[0];}
function setMes(){var n=new Date();var ini=new Date(n.getFullYear(),n.getMonth(),1);document.getElementById('dp1').value=ini.toISOString().split('T')[0];document.getElementById('dp2').value=n.toISOString().split('T')[0];}

function fetchRows(){
  return fetch(PUB_URL,{cache:'no-store'})
    .then(function(r){if(!r.ok)throw new Error();return r.text();})
    .then(function(txt){
      var rows=txt.trim().split('\n').slice(1).map(function(l){
        var cols=[],cur='',inQ=false;
        for(var i=0;i<l.length;i++){var ch=l[i];if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
        cols.push(cur.trim());return cols;
      }).filter(function(r){return r.length>=3&&r[0];});
      allRows=rows;
      document.getElementById('fonte-badge').innerHTML='<span class="flive">Ao vivo - Sheets ('+rows.length+')</span>';
      return rows;
    }).catch(function(){
      allRows=DADOS;
      document.getElementById('fonte-badge').innerHTML='<span class="flocal">Dados locais ('+DADOS.length+')</span>';
      return DADOS;
    });
}

fetchRows().then(function(){
  setUlt7();
  analisar();
});
