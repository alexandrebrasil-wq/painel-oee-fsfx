<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Farmácia — Registro</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f3;
  color: #1a1a18;
  min-height: 100vh;
}
.header {
  background: #0F6E56;
  color: #fff;
  padding: 16px;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header p  { font-size: 13px; opacity: 0.8; margin-top: 2px; }

.card {
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  margin: 16px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}

.label {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  color: #6b6b66;
  margin-bottom: 8px;
}

/* Etapa detectada */
.etapa-box {
  background: #E1F5EE;
  border: 2px solid #0F6E56;
  border-radius: 10px;
  padding: 14px 16px;
  font-size: 18px;
  font-weight: 700;
  color: #085041;
  text-align: center;
  margin-bottom: 4px;
}
.etapa-box.vazia {
  background: #f5f5f3;
  border-color: #ccc;
  color: #9e9e99;
  font-weight: 400;
  font-size: 14px;
}

/* Campo de bipe — igual ao Google Forms */
input[type="text"] {
  display: block;
  width: 100%;
  font-size: 20px;
  font-weight: 600;
  padding: 14px 16px;
  border: 2px solid #ccc;
  border-radius: 10px;
  background: #fff;
  color: #1a1a18;
  outline: none;
  font-family: 'Courier New', monospace;
  -webkit-appearance: none;
}
input[type="text"]:focus {
  border-color: #0F6E56;
}
input[type="text"].preenchido {
  border-color: #0F6E56;
  background: #E1F5EE;
  color: #085041;
}
input[type="text"]::placeholder {
  color: #9e9e99;
  font-weight: 400;
  font-family: -apple-system, sans-serif;
  font-size: 15px;
}

/* Botão confirmar */
.btn {
  display: block;
  width: calc(100% - 32px);
  margin: 0 16px 16px;
  padding: 16px;
  background: #0F6E56;
  color: #fff;
  border: none;
  border-radius: 12px;
  font-size: 17px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
}
.btn:disabled {
  background: #ccc;
  color: #fff;
  cursor: not-allowed;
}

/* Alerta justificativa */
.alerta {
  background: #FAEEDA;
  border: 1.5px solid #BA7517;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #633806;
  margin-bottom: 10px;
}
.just-btn {
  display: block;
  width: 100%;
  text-align: left;
  background: #fff;
  border: 1.5px solid #ddd;
  border-radius: 8px;
  padding: 13px 14px;
  font-size: 14px;
  color: #1a1a18;
  cursor: pointer;
  margin-bottom: 6px;
}
.just-btn.selecionado {
  border-color: #BA7517;
  background: #FAEEDA;
  color: #633806;
  font-weight: 600;
}

/* Tela de sucesso */
.sucesso {
  text-align: center;
  padding: 40px 24px;
}
.sucesso-icone {
  width: 72px; height: 72px;
  background: #E1F5EE;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
  font-size: 36px;
}
.sucesso h2 { font-size: 22px; font-weight: 700; color: #1a1a18; }
.sucesso p  { font-size: 14px; color: #6b6b66; margin-top: 6px; }
.resumo {
  background: #f5f5f3;
  border-radius: 10px;
  padding: 14px 16px;
  margin: 16px 0;
  text-align: left;
}
.resumo-linha {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  padding: 6px 0;
  border-bottom: 1px solid #e0e0de;
}
.resumo-linha:last-child { border-bottom: none; }
.resumo-linha .chave { color: #6b6b66; }
.resumo-linha .valor { font-weight: 600; font-family: 'Courier New', monospace; }

/* Loading */
.loading {
  text-align: center;
  padding: 60px 24px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #ddd;
  border-top-color: #0F6E56;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Erro */
.erro-msg {
  background: #FCEBEB;
  border: 1.5px solid #A32D2D;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #791F1F;
  margin: 0 16px 16px;
  display: none;
}

/* Páginas */
.pg { display: none; }
.pg.ativa { display: block; }
</style>
</head>
<body>

<!-- ══ CABEÇALHO ══ -->
<div class="header">
  <h1>Registro de medicação</h1>
  <p id="header-sub">Farmácia oncológica</p>
</div>

<!-- ══ PG PRINCIPAL ══ -->
<div id="pg-main" class="pg ativa">

  <!-- Etapa -->
  <div class="card">
    <div class="label">Etapa</div>
    <div class="etapa-box vazia" id="etapa-box">Não detectada</div>
  </div>

  <!-- Atendimento -->
  <div class="card">
    <div class="label">Nº atendimento</div>
    <input
      type="text"
      id="campo-atendimento"
      placeholder="Bipe o código de barras"
      autocomplete="off"
      autocorrect="off"
      autocapitalize="off"
      spellcheck="false"
      autofocus
    >
  </div>

  <!-- Justificativa (oculta por padrão) -->
  <div class="card" id="bloco-just" style="display:none">
    <div class="alerta">⚠️ Tempo acima do limite — informe o motivo.</div>
    <div class="label">Motivo da parada</div>
    <div id="lista-just"></div>
  </div>

  <div class="erro-msg" id="erro-msg">Erro ao salvar. Verifique a conexão.</div>

  <button class="btn" id="btn-confirmar" disabled onclick="enviar()">
    ✓ Confirmar e salvar
  </button>

</div>

<!-- ══ PG LOADING ══ -->
<div id="pg-loading" class="pg">
  <div class="loading">
    <div class="spinner"></div>
    <p>Salvando registro...</p>
  </div>
</div>

<!-- ══ PG SUCESSO ══ -->
<div id="pg-sucesso" class="pg">
  <div class="sucesso">
    <div class="sucesso-icone">✓</div>
    <h2>Registro salvo!</h2>
    <p id="sucesso-hora">—</p>
    <div class="resumo">
      <div class="resumo-linha"><span class="chave">Atendimento</span><span class="valor" id="res-atend">—</span></div>
      <div class="resumo-linha"><span class="chave">Etapa</span><span class="valor" id="res-etapa" style="font-family:inherit">—</span></div>
      <div class="resumo-linha" id="res-just-linha" style="display:none"><span class="chave">Justificativa</span><span class="valor" id="res-just" style="font-family:inherit">—</span></div>
    </div>
    <button class="btn" onclick="novoRegistro()">
      ↩ Novo registro
    </button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  CONFIGURAÇÃO
// ═══════════════════════════════════════
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwulrdZyfww-3ejAoGIwrGewM2eAmgCYFSY9SUKmJSU9uiGCtnTiGZT9EZxn8j3lgImhA/exec';

var SLUG_ETAPAS = {
  'sep':  'Separação',
  'pre':  'Pré QT',
  'cap':  'Capela QT',
  'disp': 'Disponível QT'
};

var LIMITES = {
  'Separação': 20, 'Pré QT': 45, 'Capela QT': 30, 'Disponível QT': 15
};

var JUSTIFICATIVAS = [
  'Falta de insumo',
  'Aguardando prescrição médica',
  'Equipamento ocupado',
  'Problema técnico',
  'Alta demanda simultânea',
  'Outro'
];

// ═══════════════════════════════════════
//  ESTADO
// ═══════════════════════════════════════
var etapa       = '';
var atendimento = '';
var just        = '';
var precisaJust = false;

// ═══════════════════════════════════════
//  INIT
// ═══════════════════════════════════════
(function() {
  // Lê etapa da URL
  var params = new URLSearchParams(window.location.search);
  var slug   = (params.get('etapa') || '').toLowerCase();
  etapa = SLUG_ETAPAS[slug] || '';

  if (etapa) {
    document.getElementById('etapa-box').textContent = etapa;
    document.getElementById('etapa-box').classList.remove('vazia');
    document.getElementById('header-sub').textContent = etapa;
  }

  // Detecta se precisa justificativa
  precisaJust = params.get('atraso') === '1';
  if (precisaJust) {
    document.getElementById('bloco-just').style.display = 'block';
    var lista = document.getElementById('lista-just');
    JUSTIFICATIVAS.forEach(function(j) {
      var btn = document.createElement('button');
      btn.className = 'just-btn';
      btn.textContent = j;
      btn.onclick = function() {
        document.querySelectorAll('.just-btn').forEach(function(b) { b.classList.remove('selecionado'); });
        btn.classList.add('selecionado');
        just = j;
        verificar();
      };
      lista.appendChild(btn);
    });
  }

  // Listener do campo de atendimento
  var campo = document.getElementById('campo-atendimento');

  campo.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      var val = campo.value.trim();
      if (val) confirmarAtendimento(val);
    }
  });

  campo.addEventListener('change', function() {
    var val = campo.value.trim();
    if (val) confirmarAtendimento(val);
  });

  campo.addEventListener('input', function() {
    clearTimeout(campo._t);
    campo._t = setTimeout(function() {
      var val = campo.value.trim();
      if (val && val.length >= 3) confirmarAtendimento(val);
    }, 150);
  });

  campo.focus();
})();

// ═══════════════════════════════════════
//  LÓGICA
// ═══════════════════════════════════════
function confirmarAtendimento(val) {
  atendimento = val;
  var campo = document.getElementById('campo-atendimento');
  campo.value    = val;
  campo.readOnly = true;
  campo.className = 'preenchido';
  verificar();
}

function verificar() {
  var ok = atendimento && etapa && (!precisaJust || just);
  document.getElementById('btn-confirmar').disabled = !ok;
}

function enviar() {
  document.getElementById('erro-msg').style.display = 'none';
  mostrarPg('pg-loading');

  var ts     = new Date().toISOString();
  var params = new URLSearchParams({
    timestamp:     ts,
    atendimento:   atendimento,
    etapa:         etapa,
    responsavel:   '',
    justificativa: just || '',
    dispositivo:   navigator.userAgent.substring(0, 80)
  });

  fetch(APPS_SCRIPT_URL + '?' + params.toString(), { method: 'GET', mode: 'no-cors' })
  .then(function() {
    mostrarSucesso(ts);
    setTimeout(novoRegistro, 2500);
  })
  .catch(function() {
    mostrarPg('pg-main');
    document.getElementById('erro-msg').style.display = 'block';
  });
}

function mostrarSucesso(ts) {
  var d = new Date(ts);
  var h = d.getHours().toString().padStart(2,'0');
  var m = d.getMinutes().toString().padStart(2,'0');
  document.getElementById('sucesso-hora').textContent = 'Salvo às ' + h + ':' + m;
  document.getElementById('res-atend').textContent = atendimento;
  document.getElementById('res-etapa').textContent = etapa;
  if (just) {
    document.getElementById('res-just-linha').style.display = 'flex';
    document.getElementById('res-just').textContent = just;
  }
  mostrarPg('pg-sucesso');
}

function novoRegistro() {
  var params = new URLSearchParams(window.location.search);
  var slug   = params.get('etapa') || '';
  var atraso = params.get('atraso') || '';
  var url    = window.location.pathname + '?etapa=' + slug + (atraso ? '&atraso=' + atraso : '');
  window.location.replace(url);
}

function mostrarPg(id) {
  document.querySelectorAll('.pg').forEach(function(p) { p.classList.remove('ativa'); });
  document.getElementById(id).classList.add('ativa');
}
</script>
</body>
</html>
