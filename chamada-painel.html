<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>i-OMT · Painel de Chamada</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0a0a0a;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
:root{
  --green:#1D9E75;--gm:#3dd68c;--gd:#0d1f18;
  --amber:#d29922;--am:#e3b341;--ad:#1f1800;
  --red:#da3633;--rm:#f85149;--rd:#1f0a0a;
}

.layout{display:grid;grid-template-rows:64px 1fr 36px;height:100vh}

/* HEADER */
.hdr{background:#070707;border-bottom:1px solid #181818;padding:0 28px;display:flex;align-items:center;gap:0}
.hdr-logo{display:flex;align-items:center;gap:10px;flex-shrink:0;margin-right:20px}
.hdr-mark{background:var(--green);color:#fff;font-size:11px;font-weight:800;padding:5px 8px;border-radius:5px;letter-spacing:.05em}
.hdr-name{font-size:12px;color:#333;letter-spacing:.04em}
.hdr-div{width:1px;height:26px;background:#1e1e1e;margin:0 20px;flex-shrink:0}
.hdr-subtitle{font-size:12px;color:#2a2a2a;letter-spacing:.04em;flex:1}
.hdr-stats{display:flex;gap:24px;align-items:center;margin-right:28px}
.hdr-stat{text-align:center}
.hdr-stat-val{font-size:20px;font-weight:700;font-family:monospace;color:var(--gm)}
.hdr-stat-lbl{font-size:9px;color:#2a2a2a;text-transform:uppercase;letter-spacing:.07em;margin-top:1px}
.hdr-clock{font-family:monospace;font-size:26px;font-weight:300;color:#ccc;letter-spacing:.1em}
.hdr-date{font-size:10px;color:#2a2a2a;margin-top:2px;letter-spacing:.04em;text-align:right}

/* BODY */
.body{display:grid;grid-template-columns:1fr 280px;overflow:hidden}

/* FILA */
.fila-wrap{overflow-y:auto;padding:16px 20px 16px 28px;display:flex;flex-direction:column;gap:0}
.fila-wrap::-webkit-scrollbar{width:3px}
.fila-wrap::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px}

.col-hdr{display:grid;grid-template-columns:56px 1fr 130px 100px;padding:0 0 8px;border-bottom:1px solid #141414;margin-bottom:10px}
.col-lbl{font-size:9px;color:#222;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.col-lbl.c{text-align:center}

/* ITEM BASE */
.fi{display:grid;grid-template-columns:56px 1fr 130px 100px;align-items:stretch;border-radius:7px;overflow:hidden;margin-bottom:7px;position:relative;transition:all .2s}

/* ITEM NORMAL */
.fi.normal{height:58px}
.fi.normal .fi-num{background:#111;color:#333;font-size:18px;font-weight:700;font-family:monospace;display:flex;align-items:center;justify-content:center}
.fi.normal .fi-info{background:#0d0d0d;border-left:1px solid #181818;padding:0 16px;display:flex;flex-direction:column;justify-content:center}
.fi.normal .fi-med{font-size:13px;font-weight:600;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi.normal .fi-sub{font-size:10px;color:#2a2a2a;margin-top:3px;font-family:monospace}
.fi.normal .fi-pill{background:#181818;color:#2a2a2a;font-size:10px;padding:4px 10px;border-radius:99px;font-weight:600}
.fi.normal .fi-timer-val{font-family:monospace;font-size:13px;letter-spacing:.04em;color:#2a2a2a}
.fi.normal .fi-timer-lbl{font-size:9px;color:#1a1a1a;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* ITEM DESTAQUE */
.fi.dest{height:80px;animation:entrar .3s ease}
.fi.dest .fi-num{background:var(--green);color:#fff;font-size:28px;font-weight:800;font-family:monospace;display:flex;align-items:center;justify-content:center}
.fi.dest .fi-info{background:var(--gd);border-left:2px solid var(--green);padding:0 16px;display:flex;flex-direction:column;justify-content:center}
.fi.dest .fi-med{font-size:20px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fi.dest .fi-sub{font-size:12px;color:var(--gm);margin-top:4px;font-family:monospace}
.fi.dest .fi-pill{background:var(--green);color:#fff;font-size:11px;padding:6px 14px;border-radius:99px;font-weight:700;animation:pulse 2s ease-in-out infinite}
.fi.dest .fi-timer-val{font-family:monospace;font-size:18px;font-weight:700;letter-spacing:.06em}
.fi.dest .fi-timer-lbl{font-size:9px;color:#666;text-transform:uppercase;letter-spacing:.07em;margin-top:3px}

/* TIMER URGENTE (>5min) */
.fi .fi-timer-val.urgente{color:var(--rm) !important;animation:piscaR 1s ease-in-out infinite}
.fi.dest .fi-status-wrap{border-left:2px solid var(--green)}
/* >5min no destaque — fundo vermelho no timer */
.fi.dest.urgente .fi-timer-val{color:var(--rm) !important;animation:piscaR 1s ease-in-out infinite}
.fi.dest.urgente .fi-num{background:var(--red)}
.fi.dest.urgente .fi-info{background:var(--rd);border-left-color:var(--red)}
.fi.dest.urgente .fi-pill{background:var(--red);animation:piscaR 1s ease-in-out infinite}
.fi.dest.urgente .fi-sub{color:var(--rm)}

/* celulas compartilhadas */
.fi-status-wrap{display:flex;align-items:center;justify-content:center;background:#0a0a0a;border-left:1px solid #141414}
.fi.dest .fi-status-wrap{background:var(--gd)}
.fi.dest.urgente .fi-status-wrap{background:var(--rd)}
.fi-timer-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#070707;border-left:1px solid #111}

/* BTN ENTREGAR */
.btn-entregar{display:none;position:absolute;right:10px;top:50%;transform:translateY(-50%);background:var(--green);border:none;color:#fff;font-size:11px;font-weight:700;padding:7px 16px;border-radius:6px;cursor:pointer;letter-spacing:.02em;z-index:5}
.btn-entregar:hover{opacity:.85}
.fi:hover .btn-entregar{display:block}
.fi.dest .btn-entregar{display:block}
.fi.dest.urgente .btn-entregar{background:var(--red)}

/* VAZIA */
.fila-vazia{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#1a1a1a;min-height:200px}
.fila-vazia-ico{font-size:40px;opacity:.25}
.fila-vazia-txt{font-size:13px;letter-spacing:.04em}

/* SIDEBAR */
.sidebar{border-left:1px solid #141414;display:flex;flex-direction:column;overflow:hidden;background:#080808}
.sb-hdr{padding:16px 18px 12px;border-bottom:1px solid #141414}
.sb-lbl{font-size:9px;color:#2a2a2a;text-transform:uppercase;letter-spacing:.1em;font-weight:600}
.hist-wrap{flex:1;overflow-y:auto;padding:8px 18px 12px}
.hist-wrap::-webkit-scrollbar{width:3px}
.hist-wrap::-webkit-scrollbar-thumb{background:#1a1a1a}
.hist-item{display:grid;grid-template-columns:8px 1fr auto;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #0f0f0f}
.hist-item:last-child{border-bottom:none}
.hist-dot{width:7px;height:7px;border-radius:50%;background:#1e1e1e;flex-shrink:0}
.hist-dot.recente{background:var(--gm)}
.hist-info{min-width:0}
.hist-med{font-size:12px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hist-sub{font-size:10px;color:#2a2a2a;margin-top:2px;font-family:monospace}
.hist-hora{font-size:10px;color:#2a2a2a;font-family:monospace;white-space:nowrap}
.hist-empty{font-size:12px;color:#222;padding:20px 0;text-align:center}

/* FOOTER */
.ftr{background:#050505;border-top:1px solid #111;padding:0 28px;display:flex;align-items:center;justify-content:space-between}
.ftr-txt{font-size:10px;color:#1e1e1e;letter-spacing:.05em}
.ftr-status{display:flex;align-items:center;gap:6px;font-size:10px;color:#2a2a2a}
.ftr-dot{width:6px;height:6px;border-radius:50%;background:#1a1a1a}
.ftr-dot.live{background:var(--gm);animation:pulse 2s infinite}
.ftr-dot.erro{background:var(--rm)}

/* LEGENDA */
.legenda{display:flex;align-items:center;gap:14px}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:#2a2a2a;letter-spacing:.05em}
.leg-dot{width:7px;height:7px;border-radius:50%}

@keyframes entrar{from{opacity:0;transform:translateY(-5px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
@keyframes piscaR{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<div class="layout">

  <header class="hdr">
    <div class="hdr-logo">
      <div class="hdr-mark">i-OMT</div>
      <div class="hdr-name">Smart Infusion Manager</div>
    </div>
    <div class="hdr-div"></div>
    <div class="hdr-subtitle">Painel de Chamada · Centro de Infusão QT</div>
    <div class="hdr-stats">
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="stat-fila">—</div>
        <div class="hdr-stat-lbl">Na fila</div>
      </div>
      <div class="hdr-div"></div>
      <div class="hdr-stat">
        <div class="hdr-stat-val" id="stat-hoje">—</div>
        <div class="hdr-stat-lbl">Hoje</div>
      </div>
    </div>
    <div>
      <div class="hdr-clock" id="hdr-clock">00:00:00</div>
      <div class="hdr-date" id="hdr-date"></div>
    </div>
  </header>

  <div class="body">

    <!-- FILA -->
    <div class="fila-wrap">
      <div class="col-hdr">
        <div class="col-lbl c">#</div>
        <div class="col-lbl" style="padding-left:16px">Medicamento · Atendimento</div>
        <div class="col-lbl c">Status</div>
        <div class="col-lbl c">Espera</div>
      </div>
      <div id="fila-corpo"></div>
    </div>

    <!-- SIDEBAR HISTÓRICO -->
    <div class="sidebar">
      <div class="sb-hdr">
        <div class="sb-lbl">Histórico do turno</div>
      </div>
      <div class="hist-wrap" id="hist-wrap">
        <div class="hist-empty">Nenhum registro ainda</div>
      </div>
    </div>

  </div>

  <footer class="ftr">
    <div class="ftr-txt">Hospital Márcio Cunha · FSFX · Ipatinga/MG</div>
    <div class="legenda">
      <div class="leg-item"><div class="leg-dot" style="background:var(--gm)"></div>Dentro do prazo</div>
      <div class="leg-item"><div class="leg-dot" style="background:var(--rm)"></div>Acima de 5 min</div>
    </div>
    <div class="ftr-status">
      <div class="ftr-dot" id="ftr-dot"></div>
      <span id="ftr-txt">Conectando...</span>
      <span id="ftr-ref" style="margin-left:10px;color:#1a1a1a">—</span>
    </div>
  </footer>

</div>

<script>
var API = 'https://script.google.com/macros/s/AKfycbynRJx9tQ13rAtWMo8behDEbdQnOsU7mqKyOB77fcTZMZXsi8rX7PkZNt1q9J7h3fb3VA/exec';
var META_MIN = 5; // minutos — acima disso sinaliza urgência
var filaAtual = [];
var erroCount = 0;

/* ---- TEMPO ---- */
function segsEspera(tsStr){ return Math.floor((Date.now() - new Date(tsStr).getTime()) / 1000); }
function fmtTempo(s){ var m=Math.floor(s/60); s=s%60; return (m<10?'0':'')+m+':'+(s<10?'0':'')+s; }
function horaStr(d){ d=new Date(d); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); }

/* ---- REMOVER ---- */
function removerItem(id){
  fetch(API+'?acao=fila_remover&id='+encodeURIComponent(id),{cache:'no-store'})
    .then(function(r){return r.json();}).then(function(){carregarFila();}).catch(function(){});
}

/* ---- RENDER ---- */
function renderFila(fila, hist){
  document.getElementById('stat-fila').textContent = fila.length;
  document.getElementById('stat-hoje').textContent = (hist?hist.length:0) + fila.length;

  var c = document.getElementById('fila-corpo');
  if(!fila.length){
    c.innerHTML = '<div class="fila-vazia"><div class="fila-vazia-ico">◎</div><div class="fila-vazia-txt">Fila vazia</div></div>';
  } else {
    c.innerHTML = '';
    fila.forEach(function(item, idx){
      var dest = idx===0;
      var segs = segsEspera(item.ts);
      var urgente = segs > META_MIN*60;
      var el = document.createElement('div');
      el.className = 'fi '+(dest?'dest':'normal')+(urgente&&dest?' urgente':'');

      var timerCls = 'fi-timer-val'+(urgente?' urgente':'');
      var timerColor = urgente ? 'color:var(--rm)' : (dest?'color:var(--gm)':'color:#2a2a2a');

      el.innerHTML =
        '<div class="fi-num">'+(idx+1)+'</div>'+
        '<div class="fi-info">'+
          '<div class="fi-med">'+esc(item.med)+'</div>'+
          '<div class="fi-sub">Atend. '+esc(item.atend)+'</div>'+
        '</div>'+
        '<div class="fi-status-wrap">'+
          '<span class="fi-pill">'+(dest?(urgente?'⚠ Urgente':'▶ Próximo'):'Aguardando')+'</span>'+
        '</div>'+
        '<div class="fi-timer-wrap">'+
          '<div class="'+timerCls+'" data-ts="'+item.ts+'" style="'+timerColor+'">'+fmtTempo(segs)+'</div>'+
          '<div class="fi-timer-lbl">na fila</div>'+
        '</div>'+
        '<button class="btn-entregar" onclick="removerItem(\''+item.id+'\')">✓ Entregar</button>';
      c.appendChild(el);
    });
  }

  /* Histórico */
  var w = document.getElementById('hist-wrap');
  if(!hist||!hist.length){
    w.innerHTML='<div class="hist-empty">Nenhum registro ainda</div>';
  } else {
    w.innerHTML='';
    hist.slice(0,40).forEach(function(item,idx){
      var el=document.createElement('div');
      el.className='hist-item';
      el.innerHTML=
        '<div class="hist-dot'+(idx<5?' recente':'')+'"></div>'+
        '<div class="hist-info">'+
          '<div class="hist-med">'+esc(item.med)+'</div>'+
          '<div class="hist-sub">Atend. '+esc(item.atend)+'</div>'+
        '</div>'+
        '<div class="hist-hora">'+horaStr(item.ts)+'</div>';
      w.appendChild(el);
    });
  }
  filaAtual = fila;
}

/* ---- CARREGAR ---- */
function carregarFila(){
  fetch(API+'?acao=fila_listar',{cache:'no-store'})
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.ok){ renderFila(d.fila,d.historico); setStatus(true); document.getElementById('ftr-ref').textContent='Atualizado '+horaStr(new Date()); }
      else { setStatus(false,d.erro); }
    })
    .catch(function(){ setStatus(false,'Sem conexão'); });
}

function setStatus(ok,msg){
  document.getElementById('ftr-dot').className='ftr-dot '+(ok?'live':'erro');
  document.getElementById('ftr-txt').textContent=ok?'Ao vivo · atualizando':(msg||'Erro de conexão');
}

/* ---- TIMERS locais ---- */
function updateTimers(){
  document.querySelectorAll('[data-ts]').forEach(function(el){
    var segs=segsEspera(el.dataset.ts);
    el.textContent=fmtTempo(segs);
    var urgente=segs>META_MIN*60;
    el.style.color=urgente?'var(--rm)':(el.closest('.fi.dest')?'var(--gm)':'#2a2a2a');
    el.className='fi-timer-val'+(urgente?' urgente':'');
    // Atualiza classe urgente no item pai (destaque)
    var fi=el.closest('.fi.dest');
    if(fi){ fi.classList.toggle('urgente',urgente); }
  });
}

/* ---- CLOCK ---- */
function clock(){
  var d=new Date();
  document.getElementById('hdr-clock').textContent=
    ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2)+':'+('0'+d.getSeconds()).slice(-2);
  var dias=['dom','seg','ter','qua','qui','sex','sáb'];
  var meses=['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez'];
  document.getElementById('hdr-date').textContent=
    dias[d.getDay()]+', '+d.getDate()+' '+meses[d.getMonth()]+'. '+d.getFullYear();
}

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

carregarFila(); clock();
setInterval(updateTimers,1000);
setInterval(clock,1000);
setInterval(carregarFila,5000);
</script>
</body>
</html>
