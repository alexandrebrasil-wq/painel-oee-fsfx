<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0d1117; color:#fff; font-family:'Segoe UI',Arial,sans-serif; min-height:100vh; display:flex; flex-direction:column; }

header { background:#161b22; border-bottom:2px solid #21262d; padding:10px 24px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
.logo { background:#003B6F; color:#fff; font-weight:700; font-size:13px; padding:6px 12px; border-radius:6px; letter-spacing:.05em; }
.header-left { display:flex; align-items:center; gap:14px; }
.header-title { font-size:18px; font-weight:600; }
.header-sub { font-size:12px; color:#8b949e; margin-top:2px; }
.header-right { display:flex; align-items:center; gap:16px; }
.clock { font-size:24px; font-weight:700; font-variant-numeric:tabular-nums; }
.date-str { font-size:11px; color:#8b949e; text-align:right; margin-top:2px; }
.dot { width:10px; height:10px; border-radius:50%; background:#3fb950; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.25} }

.kpi-bar { background:#161b22; border-bottom:1px solid #21262d; padding:8px 24px; display:flex; gap:20px; align-items:center; flex-shrink:0; flex-wrap:wrap; }
.kpi { display:flex; flex-direction:column; align-items:center; min-width:80px; }
.kpi-label { font-size:10px; color:#8b949e; text-transform:uppercase; letter-spacing:.05em; }
.kpi-value { font-size:20px; font-weight:700; font-variant-numeric:tabular-nums; }
.kpi-sep { width:1px; height:36px; background:#21262d; }
.legend { display:flex; gap:14px; margin-left:auto; align-items:center; flex-wrap:wrap; }
.leg { display:flex; align-items:center; gap:5px; font-size:11px; color:#8b949e; }
.leg-dot { width:11px; height:11px; border-radius:3px; }

.grid-wrap { flex:1; padding:14px 18px; }
.grid { display:grid; grid-template-columns:repeat(8,1fr); gap:10px; }

.card { border-radius:12px; padding:12px 10px 10px; display:flex; flex-direction:column; gap:5px; min-height:120px; transition:transform .2s; }
.card:hover { transform:translateY(-2px); }
.card.livre   { background:#1a4731; border:2px solid #3fb950; }
.card.ocupada { background:#2d2100; border:2px solid #d29922; }
.card.parada  { background:#3d1a1a; border:2px solid #f85149; }
.card.vazia   { background:#161b22; border:2px solid #21262d; }

.card-num { font-size:12px; font-weight:700; letter-spacing:.04em; }
.card.livre   .card-num { color:#3fb950; }
.card.ocupada .card-num { color:#d29922; }
.card.parada  .card-num { color:#f85149; }
.card.vazia   .card-num { color:#8b949e; }

.card-icon { font-size:26px; text-align:center; line-height:1; margin:2px 0; }
.card-status { font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.card.livre   .card-status { color:#3fb950; }
.card.ocupada .card-status { color:#d29922; }
.card.parada  .card-status { color:#f85149; }
.card.vazia   .card-status { color:#8b949e; }

.card-detail { font-size:10px; color:rgba(255,255,255,.5); line-height:1.3; }
.card-timer  { font-size:11px; font-weight:600; font-variant-numeric:tabular-nums; margin-top:auto; }
.card.livre   .card-timer { color:#3fb950; }
.card.ocupada .card-timer { color:#d29922; }
.card.parada  .card-timer { color:#f85149; }

.blink { animation:blink 1s step-start infinite; }
@keyframes blink { 50%{opacity:0} }

footer { background:#161b22; border-top:1px solid #21262d; padding:6px 24px; font-size:10px; color:#8b949e; display:flex; justify-content:space-between; flex-shrink:0; }

.src-badge { font-size:10px; padding:2px 8px; border-radius:4px; margin-left:8px; }
.src-live { background:#1a4731; color:#3fb950; }
.src-local { background:#2d2100; color:#d29922; }
</style>

let modoLive = false;

function updateClock() {
  const n = new Date();
  document.getElementById('clock').textContent = n.toLocaleTimeString('pt-BR');
  document.getElementById('dateStr').textContent = n.toLocaleDateString('pt-BR',{weekday:'long',day:'2-digit',month:'long',year:'numeric'});
}
setInterval(updateClock,1000); updateClock();

function buildGrid() {
  const g = document.getElementById('grid');
  POLTRONAS.forEach(p => {
    const d = document.createElement('div');
    d.className = 'card vazia';
    d.id = 'c_'+p.replace(/ /g,'_');
    d.innerHTML = '<div class="card-num">'+p.replace('Poltrona ','P')+'</div><div class="card-icon">🪑</div><div class="card-status">Sem registro</div><div class="card-detail"></div><div class="card-timer"></div>';
    g.appendChild(d);
  });
}

function processRows(rows) {
  const hoje = new Date().toLocaleDateString('pt-BR');
  const state = {};
  POLTRONAS.forEach(p => { state[p]={status:'vazia',detail:'',since:null,tipo:''}; });
  rows.forEach(r => {
    const [ts,pol,ev,mot,tipo] = r;
    if (!pol || !state.hasOwnProperty(pol)) return;
    const dia = ts.split(' ')[0];
    if (dia !== hoje) return;
    if (ev==='Check In Paciente') {
      state[pol]={status:'ocupada',detail:tipo||'Infusão',since:ts,tipo:tipo||''};
    } else if (ev==='Check Out Paciente') {
      state[pol]={status:'livre',detail:'Alta realizada',since:ts,tipo:''};
    } else if (ev==='Início da Parada') {
      state[pol]={status:'parada',detail:mot||'Parada',since:ts,tipo:state[pol].tipo};
    } else if (ev==='Fim da parada') {
      const t = state[pol].tipo;
      state[pol]={status:t?'ocupada':'livre',detail:t||'Parada encerrada',since:ts,tipo:t};
    }
  });
  return state;
}

function elapsed(ts) {
  try {
    const [d,h] = ts.split(' ');
    const [dd,mm,aa] = d.split('/');
    const [hh,mi,ss] = h.split(':');
    const diff = Math.floor((new Date()-new Date(aa,mm-1,dd,hh,mi,ss||0))/60000);
    if (diff<0||diff>1440) return '';
    return diff<60?diff+'min':Math.floor(diff/60)+'h'+(diff%60?String(diff%60).padStart(2,'0')+'min':'');
  } catch{return '';}
}

function renderState(state, fonte) {
  let nO=0,nP=0,nL=0;
  POLTRONAS.forEach(p => {
    const s=state[p], card=document.getElementById('c_'+p.replace(/ /g,'_'));
    if(!card) return;
    card.className='card '+s.status;
    const num=p.replace('Poltrona ','P');
    const labels={livre:'Livre',ocupada:'Em atendimento',parada:'Em parada',vazia:'Sem registro'};
    const t=s.since?elapsed(s.since):'';
    card.innerHTML='<div class="card-num">'+num+'</div><div class="card-icon">🪑</div>'
      +'<div class="card-status'+(s.status==='parada'?' blink':'')+'">'+labels[s.status]+'</div>'
      +'<div class="card-detail">'+s.detail+'</div>'
      +'<div class="card-timer">'+(t?'⏱ '+t:'')+'</div>';
    if(s.status==='ocupada') nO++;
    else if(s.status==='parada') nP++;
    else if(s.status==='livre') nL++;
  });
  document.getElementById('k-ocup').textContent=nO;
  document.getElementById('k-par').textContent=nP;
  document.getElementById('k-liv').textContent=nL;
  document.getElementById('k-pct').textContent=Math.round((nO+nP)/47*100)+'%';
  document.getElementById('k-fonte').textContent=fonte;
  document.getElementById('k-fonte').style.color=modoLive?'#3fb950':'#d29922';
}

async function fetchLive() {
  try {
    const url='https://docs.google.com/spreadsheets/d/'+SHEET_ID+'/export?format=csv&gid='+GID;
    const r=await fetch(url,{cache:'no-store'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const txt=await r.text();
    const rows=txt.trim().split('\n').slice(1).map(l=>{
      const cols=[]; let cur='',inQ=false;
      for(const ch of l){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){cols.push(cur.trim());cur='';}else cur+=ch;}
      cols.push(cur.trim()); return cols;
    }).filter(r=>r.length>=3&&r[0]);
    modoLive=true;
    renderState(processRows(rows), 'Google Sheets (ao vivo)');
    document.getElementById('footer-msg').textContent=rows.length+' registros · '+new Date().toLocaleTimeString('pt-BR');
  } catch(e) {
    modoLive=false;
    renderState(processRows(DADOS_LOCAIS), 'Dados locais ('+new Date().toLocaleDateString('pt-BR')+')');
    document.getElementById('footer-msg').textContent='Sheets indisponível — exibindo último carregamento local · '+e.message;
  }
}

buildGrid();
fetchLive();
setInterval(fetchLive, 30000);
setInterval(()=>{ const s=processRows(modoLive?[]:DADOS_LOCAIS); renderState(s, modoLive?'Google Sheets (ao vivo)':'Dados locais'); }, 60000);
</script>
